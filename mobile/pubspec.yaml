name: fashion_mobile
description: "Enterprise Fashion E-commerce Storefront Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  
  # Dependency Injection
  get_it: ^7.6.0
  injectable: ^2.3.2

  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0

  # Navigation
  go_router: ^12.1.3

  # Local Storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Utilities
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  intl: ^0.19.0
  share_plus: ^7.2.1

  # Premium UI & Animation
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  rive: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  retrofit_generator: ^8.0.6
  freezed: ^2.4.7
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
