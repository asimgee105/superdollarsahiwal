name: Build Flutter Android APK

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android and iOS Platform Boilerplates
        run: |
          cd mobile
          flutter create --platforms=android,ios --org com.fashion.aura .

      - name: Update Android SDK versions to 34
        run: |
          cd mobile/android
          echo "flutter.compileSdkVersion=34" >> local.properties
          echo "flutter.targetSdkVersion=34" >> local.properties
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' app/build.gradle || true
          sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 34/g' app/build.gradle || true
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' app/build.gradle || true
          sed -i 's/targetSdk flutter.targetSdkVersion/targetSdk 34/g' app/build.gradle || true

      - name: Install Dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Build Android APK
        run: |
          cd mobile
          flutter build apk --release --no-pub

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
